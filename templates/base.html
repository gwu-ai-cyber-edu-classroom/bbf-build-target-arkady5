<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Blog Board{% endblock %}</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 720px; margin: 2rem auto; padding: 0 1rem; }
    nav a { margin-right: 1rem; }
    .comment { border-left: 3px solid #ddd; padding-left: .75rem; margin: .75rem 0; }
    .meta { color: #666; font-size: .9rem; }
    textarea, input[type=text], input[type=password] { width: 100%; padding: .4rem; margin: .25rem 0; }
    .err { color: #b00; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ url_for('index') }}">Home</a>
    {% if is_admin %}
      <a href="{{ url_for('admin') }}">Admin</a>
      <a href="{{ url_for('logout') }}">Log out</a>
    {% else %}
      <a href="{{ url_for('login') }}">Admin login</a>
    {% endif %}
  </nav>
  <hr>
  {% block content %}{% endblock %}
</body>
</html>
