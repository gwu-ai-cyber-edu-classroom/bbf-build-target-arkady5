name: issue-events

# Handles two things in one workflow:
#   1. Slash commands in issue comments (/repro-confirmed, /repro-failed,
#      /out-of-scope) -> apply state labels.
#   2. Issue closed via merged PR -> apply 'fixed' label.

on:
  issue_comment:
    types: [created]
  issues:
    types: [closed]

permissions:
  issues: write
  contents: read

jobs:
  slash-command:
    if: github.event_name == 'issue_comment' && !github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Parse slash command
        id: cmd
        env:
          BODY: ${{ github.event.comment.body }}
          ASSOCIATION: ${{ github.event.comment.author_association }}
        run: |
          set -euo pipefail
          # Read up to the first newline of the comment body.
          FIRST_LINE=$(printf '%s' "$BODY" | head -c 200 | head -n1 | tr -d '\r' | xargs)
          ADD=""
          REMOVE=""
          case "$FIRST_LINE" in
            /repro-confirmed*)
              ADD="valid"
              REMOVE="invalid"
              ;;
            /repro-failed*)
              ADD="invalid"
              REMOVE="valid"
              ;;
            /out-of-scope*)
              # Facilitator-only: gated by org-membership.
              if [[ "$ASSOCIATION" == "MEMBER" || "$ASSOCIATION" == "OWNER" || "$ASSOCIATION" == "COLLABORATOR" ]]; then
                ADD="invalid"
                REMOVE="valid"
              else
                echo "::notice::/out-of-scope ignored: author not an org member"
              fi
              ;;
            *)
              # Not a recognized slash command; nothing to do.
              ;;
          esac
          echo "add=$ADD" >> "$GITHUB_OUTPUT"
          echo "remove=$REMOVE" >> "$GITHUB_OUTPUT"

      - name: Apply labels
        if: steps.cmd.outputs.add != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
          ADD: ${{ steps.cmd.outputs.add }}
          REMOVE: ${{ steps.cmd.outputs.remove }}
        run: |
          set -euo pipefail
          # Auto-create the label so a missing label can never silently swallow
          # the /repro-confirmed (this was a real footgun in manual setups).
          case "$ADD" in
            valid)   COLOR=0E8A16; DESC="Break confirmed reproducible" ;;
            invalid) COLOR=B60205; DESC="Break failed repro or ruled out" ;;
            *)       COLOR=ededed; DESC="" ;;
          esac
          gh label create "$ADD" -R "$REPO" -c "$COLOR" -d "$DESC" --force >/dev/null 2>&1 || true
          gh issue edit "$ISSUE" -R "$REPO" --add-label "$ADD" || true
          if [[ -n "$REMOVE" ]]; then
            gh issue edit "$ISSUE" -R "$REPO" --remove-label "$REMOVE" || true
          fi

  label-on-close:
    if: github.event_name == 'issues' && github.event.action == 'closed' && contains(github.event.issue.labels.*.name, 'valid')
    runs-on: ubuntu-latest
    steps:
      - name: Add fixed label
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          gh label create fixed -R "$REPO" -c 1D76DB -d "Break addressed by merged PR" --force >/dev/null 2>&1 || true
          gh issue edit "$ISSUE" -R "$REPO" --add-label "fixed" || true
